<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N4 Drill</title>
<style>
  :root {
    color-scheme: light dark;
    --gap: 12px;
    --fg: #1a1a1a;
    --muted: #666;
    --bg: #fafafa;
    --card: #ffffff;
    --border: #ddd;
    --accent: #3a6ea5;
    --pass: #2a7a3a;
    --fail: #a23a3a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#eee; --muted:#aaa; --bg:#111; --card:#1c1c1c; --border:#333; --accent:#7fa9d7; --pass:#7dd58e; --fail:#e89595; }
  }
  * { box-sizing: border-box; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--fg);
    background: var(--bg);
    margin: 0;
    padding: var(--gap);
    max-width: 760px;
    margin-inline: auto;
  }
  h1 { font-size: 18px; margin: 4px 0 12px; }
  section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: var(--gap); }
  textarea, input[type=password], input[type=text] {
    width: 100%; font: inherit; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }
  textarea[lang="ja"] { font-size: 19px; line-height: 1.5; }
  button { font: inherit; padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: inherit; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .row { display: flex; gap: var(--gap); align-items: center; flex-wrap: wrap; }
  .muted { color: var(--muted); font-size: 13px; }
  .prompt-en { font-size: 18px; margin: 8px 0 14px; }
  #status-line { font-size: 13px; color: var(--muted); }
  #reveal-panel[hidden] { display: none; }
  .verdict-pass { color: var(--pass); font-weight: 600; }
  .verdict-fail { color: var(--fail); font-weight: 600; }
  .drill-entry { border-top: 1px dashed var(--border); padding: 8px 0; font-size: 13px; }
  .drill-entry .meta { color: var(--muted); }
  .drill-entry .prompt, .drill-entry .reference, .drill-entry .user-answer { margin: 2px 0; }
  details summary { cursor: pointer; user-select: none; }
  .judges { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .judges .j { margin: 2px 0; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); font-size: 12px; margin-right: 4px; }
  .pill.pass { color: var(--pass); }
  .pill.fail { color: var(--fail); }
  .ref-jp { font-size: 19px; }
</style>
</head>
<body>

<!-- Inline data. These two scripts are the immutable, prompt-cacheable corpus. -->
<script type="application/json" id="vocab">{{VOCAB_JSON}}</script>
<script type="application/json" id="grammar">{{GRAMMAR_JSON}}</script>

<!-- Persisted preferences. Updating these data-attributes is the only way to
     change runtime parameters; everything is settable from the DOM. -->
<div id="settings"
  data-model="gpt-5"
  data-service-tier="flex"
  data-temperature="1"
  data-grammar-sample-size="2"
  data-vocab-sample-size="10"
  data-queue-target="5"
  data-instructions=""
  hidden></div>

<!-- Persistent history. One child element per completed drill. -->
<div id="history" hidden></div>

<h1>N4 Grammar Drill</h1>
<div id="status-line">Loading…</div>

<section id="key-entry">
  <p><strong>Enter your OpenAI API key.</strong> Held in memory only; never written to disk.</p>
  <div class="row">
    <input id="api-key" type="password" autocomplete="off" spellcheck="false" placeholder="sk-…" style="flex:1; min-width: 220px;">
    <button id="key-submit" class="primary">Start</button>
  </div>
  <p class="muted">Tip: paste your key once per launch. Closing the tab discards it.</p>
</section>

<section id="instructions-section" hidden>
  <label for="instructions" class="muted">Optional steering instructions (kept across launches):</label>
  <textarea id="instructions" rows="2" placeholder="e.g. focus on ば conditionals; include cooking vocab"></textarea>
</section>

<section id="drill-card" hidden>
  <div class="muted">Translate to Japanese:</div>
  <div class="prompt-en" id="prompt-en"></div>
  <textarea id="user-answer" lang="ja" placeholder="日本語で…" autocomplete="off" spellcheck="false"></textarea>
  <div class="row" style="margin-top:8px;">
    <button id="grade-btn" class="primary">Grade</button>
    <button id="skip-btn">Skip</button>
    <span id="queue-status" class="muted"></span>
  </div>
</section>

<section id="reveal-panel" hidden>
  <div class="row">
    <span id="verdict-label"></span>
    <span class="pill" id="target-grammar-pill"></span>
  </div>
  <div class="ref-jp" id="reference-jp"></div>
  <div class="muted" id="drill-notes"></div>
  <div class="judges" id="judges"></div>
  <div class="row" style="margin-top:10px;">
    <button id="next-btn" class="primary">Next drill</button>
  </div>
</section>

<section id="stats-section" hidden>
  <details>
    <summary><span id="stats-summary">History</span></summary>
    <div id="history-view"></div>
  </details>
</section>

<script>
(function () {
  "use strict";

  // -- Data ------------------------------------------------------------------
  const VOCAB = JSON.parse(document.getElementById("vocab").textContent || "[]");
  const GRAMMAR_ALL = JSON.parse(document.getElementById("grammar").textContent || "[]");
  // Skip unverified examples from the sampling pool — they were flagged in the
  // source deck and are not safe references for new drills. We still keep them
  // visible in the inline JSON in case they're useful in future iterations.
  const GRAMMAR = GRAMMAR_ALL.filter(g => !((g.tags || []).includes("unverified")));

  // -- Settings (read from #settings data-attrs, with safe fallbacks) --------
  const settingsEl = document.getElementById("settings");
  function s(name, def) {
    const v = settingsEl.getAttribute("data-" + name);
    return v == null || v === "" ? def : v;
  }
  function sInt(name, def) { return parseInt(s(name, String(def)), 10); }
  function sFloat(name, def) { return parseFloat(s(name, String(def))); }
  function getModel() { return s("model", "gpt-5"); }
  function getServiceTier() { return s("service-tier", "flex"); }
  function getTemperature() { return sFloat("temperature", 1); }
  function getGrammarSampleSize() { return Math.max(1, sInt("grammar-sample-size", 2)); }
  function getVocabSampleSize() { return Math.max(1, sInt("vocab-sample-size", 10)); }
  function getQueueTarget() { return Math.max(1, sInt("queue-target", 5)); }
  function getInstructions() { return s("instructions", ""); }
  function setInstructions(text) {
    settingsEl.setAttribute("data-instructions", text || "");
  }

  // -- API key (closure-only) ------------------------------------------------
  let API_KEY = null;
  function hasKey() { return typeof API_KEY === "string" && API_KEY.length > 0; }

  // -- Sampling --------------------------------------------------------------
  function sample(arr, n) {
    const k = Math.min(n, arr.length);
    const idx = new Set();
    const out = [];
    while (out.length < k) {
      const i = Math.floor(Math.random() * arr.length);
      if (idx.has(i)) continue;
      idx.add(i);
      out.push(arr[i]);
    }
    return out;
  }

  // -- Prompt prefix (stable; cacheable) -------------------------------------
  // The full vocab + grammar corpus and instructions live here. We rebuild
  // this string once at boot and pass the same reference on every call so
  // OpenAI's automatic prompt cache treats it as a shared prefix.
  const SYSTEM_PROMPT = buildSystemPrompt();

  function buildSystemPrompt() {
    const parts = [];
    parts.push(
      "You are an expert author and grader of JLPT N4 Japanese grammar drills.",
      "",
      "You will receive a JSON instruction in the user message specifying one of three tasks:",
      "  - \"generate\": produce a new drill from offered candidates.",
      "  - \"approve\": judge a candidate drill for correctness before it is shown to the user.",
      "  - \"grade\": judge a user's typed answer against the drill's reference answer.",
      "",
      "Always respond with JSON conforming to the schema attached to the request.",
      "",
      "## Familiar vocabulary",
      "The learner has studied these vocabulary items in their Mochi deck:",
      JSON.stringify(VOCAB),
      "",
      "## Reference grammar examples",
      "Each item below is an English/Japanese sentence pair from the learner's deck.",
      "Each pair exemplifies a specific N4 grammar pattern. Refer to a pair by its id.",
      JSON.stringify(GRAMMAR),
      "",
      "## Generation rules",
      "When the task is \"generate\":",
      "  - The user message includes `grammar_candidates` (a small sampled subset of the reference grammar examples) and `vocab_candidates` (a sampled subset of the familiar vocabulary).",
      "  - Pick EXACTLY ONE item from grammar_candidates as the focus pattern.",
      "  - Identify what N4 grammar pattern that example exemplifies and produce a fresh English prompt + Japanese reference sentence that demonstrates THE SAME pattern.",
      "  - Use 2–5 vocab items from vocab_candidates, plus common Japanese (particles, copula, basic verbs like する/ある/いる) as needed.",
      "  - Do not reuse the candidate's exact sentence.",
      "  - Output: { prompt_en, reference_jp, target_grammar_id, target_grammar_label, notes }",
      "    - target_grammar_id MUST equal the chosen candidate's id.",
      "    - target_grammar_label is a short label naming the pattern, e.g. \"〜たことがある (experience)\" or \"〜なければ (negative conditional)\".",
      "    - notes is a short optional sentence explaining the pattern in English.",
      "  - Optional `user_instructions` may steer style or topic; honour it when feasible but never at the cost of the grammar focus.",
      "  - Be conservative: if you cannot form a clean N4-level drill from the offered candidates, return { error: \"no-coherent-combo\" } instead and a `reason`.",
      "",
      "## Approval rules",
      "When the task is \"approve\":",
      "  - The user message includes a candidate drill: { prompt_en, reference_jp, target_grammar_id, target_grammar_label, notes }.",
      "  - Verdict \"yes\" iff ALL of the following hold:",
      "    a) reference_jp is a correct, natural, N4-level Japanese translation of prompt_en.",
      "    b) reference_jp genuinely exhibits the same N4 grammar pattern as the referenced target_grammar_id example.",
      "    c) prompt_en is fluent unambiguous English; a reasonable N4 learner could translate it without misreading intent.",
      "    d) target_grammar_label correctly names the pattern shown.",
      "  - Otherwise verdict \"no\". Include a one-sentence `reason`.",
      "",
      "## Grading rules",
      "When the task is \"grade\":",
      "  - The user message includes { prompt_en, reference_jp, target_grammar_label, user_answer }.",
      "  - Verdict \"yes\" iff user_answer is a correct N4 translation of prompt_en:",
      "    semantically equivalent, grammatically correct, demonstrating the same target grammar pattern.",
      "    Minor stylistic differences (word order, optional politeness, alternative correct vocab) are OK.",
      "    Wrong particle, wrong tense/aspect, wrong vocabulary that changes meaning, or omission of the target pattern are NOT OK.",
      "  - Include a one-sentence `reason`.",
      "",
      "Be strict but charitable. Accuracy matters more than throughput.",
    );
    return parts.join("\n");
  }

  // -- JSON schemas for structured outputs -----------------------------------
  const GENERATE_SCHEMA = {
    name: "drill_generate",
    strict: true,
    schema: {
      type: "object",
      additionalProperties: false,
      properties: {
        prompt_en: { type: "string" },
        reference_jp: { type: "string" },
        target_grammar_id: { type: "string" },
        target_grammar_label: { type: "string" },
        notes: { type: "string" },
        error: { type: ["string", "null"] },
        reason: { type: ["string", "null"] },
      },
      required: ["prompt_en", "reference_jp", "target_grammar_id", "target_grammar_label", "notes", "error", "reason"],
    },
  };

  const JUDGE_SCHEMA = {
    name: "drill_judge",
    strict: true,
    schema: {
      type: "object",
      additionalProperties: false,
      properties: {
        verdict: { type: "string", enum: ["yes", "no"] },
        reason: { type: "string" },
      },
      required: ["verdict", "reason"],
    },
  };

  // -- OpenAI call -----------------------------------------------------------
  async function callOpenAI(userPayload, schema) {
    if (!hasKey()) throw new Error("no api key");
    const body = {
      model: getModel(),
      service_tier: getServiceTier(),
      temperature: getTemperature(),
      messages: [
        { role: "system", content: SYSTEM_PROMPT },
        { role: "user", content: JSON.stringify(userPayload) },
      ],
      response_format: { type: "json_schema", json_schema: schema },
      seed: Math.floor(Math.random() * 1e9),
    };
    const resp = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY,
      },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      let detail = "";
      try { detail = await resp.text(); } catch (e) {}
      throw new Error("openai " + resp.status + ": " + detail.slice(0, 300));
    }
    const data = await resp.json();
    const text = data?.choices?.[0]?.message?.content;
    if (!text) throw new Error("openai: empty response");
    return JSON.parse(text);
  }

  // -- Drill lifecycle -------------------------------------------------------
  async function generateDrill() {
    const gCands = sample(GRAMMAR, getGrammarSampleSize());
    const vCands = sample(VOCAB, getVocabSampleSize());
    const inst = getInstructions();
    const payload = {
      task: "generate",
      grammar_candidates: gCands,
      vocab_candidates: vCands,
      user_instructions: inst || null,
    };
    const out = await callOpenAI(payload, GENERATE_SCHEMA);
    if (out.error) {
      const err = new Error("generator-skip: " + (out.error || ""));
      err.skip = true;
      throw err;
    }
    // Sanity: target_grammar_id should be one of the offered candidates
    const valid = gCands.some(g => g.id === out.target_grammar_id);
    if (!valid) {
      const err = new Error("generator picked unknown grammar id");
      err.skip = true;
      throw err;
    }
    return out;
  }

  async function approve(drill) {
    const payload = {
      task: "approve",
      drill: {
        prompt_en: drill.prompt_en,
        reference_jp: drill.reference_jp,
        target_grammar_id: drill.target_grammar_id,
        target_grammar_label: drill.target_grammar_label,
        notes: drill.notes,
      },
    };
    const calls = [0, 1, 2].map(() => callOpenAI(payload, JUDGE_SCHEMA));
    const verdicts = await Promise.all(calls);
    const passed = verdicts.every(v => v.verdict === "yes");
    return { passed, verdicts };
  }

  async function grade(drill, userAnswer) {
    const payload = {
      task: "grade",
      prompt_en: drill.prompt_en,
      reference_jp: drill.reference_jp,
      target_grammar_label: drill.target_grammar_label,
      user_answer: userAnswer,
    };
    const calls = [0, 1, 2].map(() => callOpenAI(payload, JUDGE_SCHEMA));
    const verdicts = await Promise.all(calls);
    const passed = verdicts.every(v => v.verdict === "yes");
    return { passed, verdicts };
  }

  // -- Prefetch queue --------------------------------------------------------
  // In-memory only. Never serialised to DOM. Surviving across launches is not
  // required — at boot we just refill from scratch.
  const queue = [];
  let inflight = 0;

  function refillQueue() {
    if (!hasKey()) return;
    const target = getQueueTarget();
    while (queue.length + inflight < target) {
      inflight++;
      generateAndApprove()
        .then(drill => {
          if (drill) {
            queue.push(drill);
            // If the UI is sitting on the "Generating…" placeholder, the
            // arriving drill is what we were waiting for — render it now.
            if (currentDrill === null && !revealVisible()) {
              renderCurrentDrill();
            }
          }
        })
        .catch(err => {
          if (!err.skip) console.error("prefetch error:", err);
        })
        .finally(() => {
          inflight--;
          updateQueueStatus();
          // Try to refill again — but only if we are below target. Avoids tight loops.
          if (hasKey() && queue.length + inflight < getQueueTarget()) {
            setTimeout(refillQueue, 50);
          }
        });
    }
    updateQueueStatus();
  }

  function revealVisible() {
    const el = document.getElementById("reveal-panel");
    return el && !el.hasAttribute("hidden");
  }

  async function generateAndApprove() {
    const drill = await generateDrill();
    const { passed, verdicts } = await approve(drill);
    if (!passed) return null;
    drill._approval = verdicts;
    return drill;
  }

  // -- UI state machine ------------------------------------------------------
  let currentDrill = null;

  function updateQueueStatus() {
    const el = document.getElementById("queue-status");
    if (!el) return;
    el.textContent = "Queue: " + queue.length + (inflight ? " (+" + inflight + " in flight)" : "");
  }

  function setStatus(text) {
    const el = document.getElementById("status-line");
    if (el) el.textContent = text;
  }

  function show(id, on) {
    const el = document.getElementById(id);
    if (!el) return;
    if (on) el.removeAttribute("hidden");
    else el.setAttribute("hidden", "");
  }

  function renderCurrentDrill() {
    if (!currentDrill) {
      // Need to pull one from the queue
      if (queue.length === 0) {
        document.getElementById("prompt-en").textContent = "Generating…";
        document.getElementById("user-answer").value = "";
        document.getElementById("user-answer").disabled = true;
        document.getElementById("grade-btn").disabled = true;
        return;
      }
      currentDrill = queue.shift();
      refillQueue();
    }
    document.getElementById("prompt-en").textContent = currentDrill.prompt_en;
    document.getElementById("user-answer").value = "";
    document.getElementById("user-answer").disabled = false;
    document.getElementById("grade-btn").disabled = false;
    document.getElementById("user-answer").focus();
    show("reveal-panel", false);
    show("drill-card", true);
  }

  async function onGrade() {
    if (!currentDrill) return;
    const answer = document.getElementById("user-answer").value.trim();
    if (!answer) {
      alert("Type an answer first.");
      return;
    }
    document.getElementById("grade-btn").disabled = true;
    document.getElementById("skip-btn").disabled = true;
    document.getElementById("user-answer").disabled = true;
    setStatus("Grading…");
    try {
      const { passed, verdicts } = await grade(currentDrill, answer);
      const reasoning = verdicts.map((v, i) => "judge " + (i + 1) + ": " + v.verdict + " — " + v.reason).join("\n");
      appendHistoryEntry(currentDrill, answer, passed, verdicts);
      showReveal(currentDrill, passed, verdicts);
      setStatus("Saved.");
    } catch (e) {
      setStatus("Grading failed: " + e.message);
      document.getElementById("grade-btn").disabled = false;
      document.getElementById("skip-btn").disabled = false;
      document.getElementById("user-answer").disabled = false;
    }
  }

  function showReveal(drill, passed, verdicts) {
    document.getElementById("verdict-label").innerHTML = passed
      ? '<span class="verdict-pass">✓ Pass</span>'
      : '<span class="verdict-fail">✗ Miss</span>';
    document.getElementById("target-grammar-pill").textContent = drill.target_grammar_label || "";
    document.getElementById("reference-jp").textContent = drill.reference_jp;
    document.getElementById("drill-notes").textContent = drill.notes || "";
    const judgesEl = document.getElementById("judges");
    judgesEl.innerHTML = "";
    verdicts.forEach((v, i) => {
      const row = document.createElement("div");
      row.className = "j";
      row.innerHTML = '<span class="pill ' + (v.verdict === "yes" ? "pass" : "fail") + '">judge ' + (i + 1) + ' · ' + v.verdict + '</span> ' + escapeText(v.reason);
      judgesEl.appendChild(row);
    });
    show("reveal-panel", true);
  }

  function escapeText(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  // -- History (DOM-as-database checkpoint) ---------------------------------
  // All persistence flows through here. Touching this div is the only signal
  // that meaningful state changed. Hidden from UI rendering; surfaced via the
  // stats section instead.
  function appendHistoryEntry(drill, userAnswer, passed, verdicts) {
    const el = document.createElement("div");
    el.className = "drill-entry";
    el.setAttribute("data-grammar-id", drill.target_grammar_id || "");
    el.setAttribute("data-grammar-label", drill.target_grammar_label || "");
    el.setAttribute("data-verdict", passed ? "pass" : "fail");
    el.setAttribute("data-timestamp", new Date().toISOString());

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = (passed ? "✓ " : "✗ ") + (drill.target_grammar_label || "") + " · " + new Date().toLocaleString();

    const p = document.createElement("div"); p.className = "prompt"; p.textContent = "EN: " + drill.prompt_en;
    const r = document.createElement("div"); r.className = "reference"; r.textContent = "REF: " + drill.reference_jp;
    const u = document.createElement("div"); u.className = "user-answer"; u.textContent = "YOU: " + userAnswer;

    el.appendChild(meta);
    el.appendChild(p);
    el.appendChild(r);
    el.appendChild(u);

    verdicts.forEach((v, i) => {
      const j = document.createElement("div");
      j.className = "j";
      j.setAttribute("data-judge", String(i + 1));
      j.setAttribute("data-verdict", v.verdict);
      j.textContent = "judge " + (i + 1) + ": " + v.verdict + " — " + v.reason;
      el.appendChild(j);
    });

    document.getElementById("history").appendChild(el);
    refreshStatsView();
  }

  function refreshStatsView() {
    const hist = document.getElementById("history");
    const entries = Array.from(hist.children);
    let pass = 0, fail = 0;
    entries.forEach(e => {
      if (e.getAttribute("data-verdict") === "pass") pass++;
      else fail++;
    });
    const total = pass + fail;
    document.getElementById("stats-summary").textContent =
      "History · " + total + " drill" + (total === 1 ? "" : "s") +
      (total ? " · " + pass + " pass / " + fail + " miss" : "");

    // Render the (read-only) history view as a clone of the data elements.
    // We render it transiently rather than living in #history because the
    // stored entries are the canonical record.
    const view = document.getElementById("history-view");
    view.innerHTML = "";
    entries.slice().reverse().slice(0, 50).forEach(src => {
      view.appendChild(src.cloneNode(true));
    });
    if (total) show("stats-section", true);
  }

  function onNext() {
    currentDrill = null;
    renderCurrentDrill();
  }

  function onSkip() {
    currentDrill = null;
    renderCurrentDrill();
  }

  // -- Boot ------------------------------------------------------------------
  function boot() {
    // Reset ephemeral UI state every launch. The MiniClay launcher autosaves
    // the full document including transient section visibility, so a session
    // that exited mid-drill would otherwise come back with the API key prompt
    // hidden and a stale drill-card visible — impossible to recover from. Only
    // #history and #settings are truly persistent; everything else is derived.
    show("key-entry", true);
    show("instructions-section", false);
    show("drill-card", false);
    show("reveal-panel", false);
    show("stats-section", false);
    const promptEl = document.getElementById("prompt-en");
    if (promptEl) promptEl.textContent = "";
    const answerEl = document.getElementById("user-answer");
    if (answerEl) { answerEl.value = ""; answerEl.disabled = false; }
    const queueEl = document.getElementById("queue-status");
    if (queueEl) queueEl.textContent = "";

    // Hydrate instructions from settings into the textarea.
    document.getElementById("instructions").value = getInstructions();
    document.getElementById("instructions").addEventListener("blur", function () {
      setInstructions(this.value);
    });

    document.getElementById("key-submit").addEventListener("click", onSubmitKey);
    document.getElementById("api-key").addEventListener("keydown", function (e) {
      if (e.key === "Enter") onSubmitKey();
    });
    document.getElementById("grade-btn").addEventListener("click", onGrade);
    document.getElementById("skip-btn").addEventListener("click", onSkip);
    document.getElementById("next-btn").addEventListener("click", onNext);
    document.getElementById("user-answer").addEventListener("keydown", function (e) {
      // Cmd/Ctrl+Enter to grade.
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") onGrade();
    });

    // If history pre-exists (e.g., persisted via MiniClay), refresh the view.
    refreshStatsView();

    setStatus(VOCAB.length === 0 || GRAMMAR.length === 0
      ? "WARNING: vocab or grammar bank is empty — drills cannot be generated."
      : "Ready. Vocab: " + VOCAB.length + " · Grammar bank: " + GRAMMAR.length + " (" + (GRAMMAR_ALL.length - GRAMMAR.length) + " unverified excluded).");
  }

  function onSubmitKey() {
    const v = document.getElementById("api-key").value.trim();
    if (!v) { alert("Paste an API key first."); return; }
    API_KEY = v;
    document.getElementById("api-key").value = "";
    show("key-entry", false);
    show("instructions-section", true);
    show("drill-card", true);
    show("stats-section", true);
    setStatus("Generating first drill… (flex tier can be slow)");
    renderCurrentDrill();
    refillQueue();
  }

  // Run boot once the DOM is ready.
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
