<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N4 Drill</title>
<style>
  :root {
    color-scheme: light dark;
    --gap: 12px;
    --fg: #1a1a1a;
    --muted: #666;
    --bg: #fafafa;
    --card: #ffffff;
    --border: #ddd;
    --accent: #3a6ea5;
    --pass: #2a7a3a;
    --fail: #a23a3a;
    --peel: #ececec;
    --peel-fold-a: #cfcfcf;
    --peel-fold-b: #bcbcbc;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg:#eee; --muted:#aaa; --bg:#111; --card:#1c1c1c; --border:#333;
      --accent:#7fa9d7; --pass:#7dd58e; --fail:#e89595;
      --peel:#262626; --peel-fold-a:#3d3d3d; --peel-fold-b:#2a2a2a;
    }
  }
  * { box-sizing: border-box; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--fg); background: var(--bg);
    margin: 0; padding: var(--gap);
    max-width: 760px; margin-inline: auto;
  }
  h1 { font-size: 18px; margin: 4px 0 12px; }
  h2 { font-size: 14px; margin: 4px 0 8px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: var(--gap); }

  /* Generic form fields used in Settings & file-pick. The answer field on a
     fresh card uses .answer-input instead — a borderless school-notebook
     underline that lines up with the prompt's content edge. */
  textarea, input[type=password], input[type=text], input[type=number], input[type=file] {
    width: 100%; font: inherit; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: inherit;
  }
  input[type=number] { width: 100px; }
  textarea { min-height: 80px; resize: vertical; }
  textarea[lang="ja"] { font-size: 19px; line-height: 1.5; }

  button { font: inherit; padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: inherit; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }

  /* Unified ghost icon button — one visual idiom for trash, submit, generate. */
  .icon-btn {
    font: inherit;
    background: transparent; border: 0; padding: 4px 6px;
    color: var(--muted); cursor: pointer;
    border-radius: 4px;
    display: inline-flex; align-items: center; gap: 6px;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .icon-btn:hover { color: var(--fg); background: rgba(127, 127, 127, 0.10); }
  .icon-btn.danger:hover { color: var(--fail); background: rgba(232, 149, 149, 0.10); }
  .icon-btn.accent:hover { color: var(--accent); background: rgba(127, 169, 215, 0.12); }
  .icon-btn svg { display: block; }

  .row { display: flex; gap: var(--gap); align-items: center; flex-wrap: wrap; }
  .muted { color: var(--muted); font-size: 13px; }
  .status-line { font-size: 13px; color: var(--muted); white-space: pre-wrap; margin-bottom: var(--gap); }
  .verdict-pass { color: var(--pass); font-weight: 600; }
  .verdict-fail { color: var(--fail); font-weight: 600; }
  details summary { cursor: pointer; user-select: none; }

  .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); font-size: 12px; margin-right: 4px; }
  .pill.pass { color: var(--pass); }
  .pill.fail { color: var(--fail); }
  .pill.grading { color: var(--accent); }
  .pill.fresh { color: var(--muted); }

  .ref-jp { font-size: 19px; line-height: 1.4; }

  .tabs { display: flex; gap: 4px; margin-bottom: var(--gap); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .tabs button { flex: 1; padding: 8px 12px; border: 0; background: transparent; color: var(--muted); font-weight: 500; border-radius: 6px; }
  .tabs button[aria-selected="true"] { background: var(--accent); color: white; }

  .segmented { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--bg); }
  .segmented label { padding: 6px 10px; cursor: pointer; font-size: 13px; user-select: none; }
  .segmented input { display: none; }
  .segmented label:has(input:checked) { background: var(--accent); color: white; }
  .segmented label + label { border-left: 1px solid var(--border); }

  .toggle { position: relative; display: inline-block; width: 38px; height: 22px; vertical-align: middle; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 22px; transition: 0.2s; }
  .toggle .slider::before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(16px); }

  .control-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
  .control-row .label { font-size: 13px; color: var(--muted); min-width: 80px; }

  /* Inline strip after the cards stack — the natural place for "what comes next" controls. */
  .controls-strip {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 14px;
    margin-bottom: var(--gap);
    color: var(--muted);
  }
  .controls-strip .label { font-size: 13px; }
  .controls-strip .label.glyph { font-size: 18px; line-height: 1; cursor: help; }
  .controls-strip .auto-gen { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  /* While auto-gen is on the manual + is redundant — hide it. */
  .controls-strip:has(.auto-gen input:checked) .generate-btn { display: none; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: var(--gap); border-left-width: 3px; }
  .card[data-state="fresh"] { border-left-color: var(--accent); }
  .card[data-state="grading"] { border-left-color: var(--accent); opacity: 0.92; }
  .card[data-state="graded-pass"] { border-left-color: var(--pass); }
  .card[data-state="graded-fail"] { border-left-color: var(--fail); }
  .card-state-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 6px; }
  .card-prompt { font-size: 17px; margin: 4px 0 6px; display: flex; align-items: center; gap: 10px; }
  .card-prompt-text { flex: 1; }

  /* Answer field: borderless underline, aligned with the prompt's content edge. */
  input.answer-input {
    display: block; width: 100%;
    font: inherit; font-size: 19px; line-height: 1.6;
    color: inherit; background: transparent;
    padding: 4px 0; margin: 4px 0 2px;
    border: 0; border-bottom: 1px solid var(--border); border-radius: 0;
    outline: none;
  }
  input.answer-input:focus { border-bottom-color: var(--accent); }
  input.answer-input:disabled { color: var(--fg); opacity: 1; }
  input.answer-input::placeholder { color: var(--muted); }

  /* Answer row hosts the input and a ghost-submit icon-button on the right. */
  .answer-row { display: flex; align-items: center; gap: 12px; margin: 4px 0 2px; }
  .answer-row input.answer-input { margin: 0; flex: 1; }
  .card-reveal { margin-top: 12px; }

  /* Model answer slot — sits right after the prompt. While fresh, a peel
     sticker covers it; on graded/grading cards, the answer renders plain. */
  .model-answer { position: relative; margin: 0 0 6px; padding: 4px 0; }
  /* When the sticker is present, push the right edge in so it aligns with
     the answer-input's right edge (input flex + 12px gap + ~28px button). */
  .model-answer:has(.peel) { margin-right: 40px; }

  /* Peel-off sticker — purely visual reveal hint. Rest: full coverage.
     Hover: lift only a tiny corner notch as an affordance for "click to lift".
     Click: fully peeled (instant). Click again: re-cover (instant).
     Hover is suppressed when peeled so a stuck cursor doesn't re-cover the answer. */
  .peel {
    position: absolute;
    inset: -2px 0;
    background: var(--peel);
    background-image: repeating-linear-gradient(45deg,
      rgba(255,255,255,0.03) 0 2px, transparent 2px 7px);
    cursor: pointer;
    z-index: 1; user-select: none;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 100%);
    transition: clip-path 0.4s cubic-bezier(0.3, 0.7, 0.3, 1);
  }
  .model-answer:hover .peel:not(.peeled) {
    clip-path: polygon(0 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 12px));
  }
  .peel.peeled {
    clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%, 100% 0);
    transition: none;
  }

  /* Folded-over corner — the back of the sticker visible at the peel. */
  .peel-fold {
    position: absolute;
    inset: -2px 0;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(135deg, var(--peel-fold-a) 0%, var(--peel-fold-b) 75%);
    clip-path: polygon(0 100%, 0 100%, 0 100%);
    filter: drop-shadow(-1px -1px 1.5px rgba(0, 0, 0, 0.35));
    transition: clip-path 0.4s cubic-bezier(0.3, 0.7, 0.3, 1);
  }
  .peel-fold::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.10), transparent 40%);
    clip-path: inherit;
  }
  .model-answer:hover .peel:not(.peeled) ~ .peel-fold {
    clip-path: polygon(16px 100%, 0 calc(100% - 12px), 12px calc(100% - 15px));
  }

  /* Judges */
  .judges { margin-top: 6px; font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .judges .j { display: block; }
  .judges .reveal-judge { display: flex; gap: 10px; align-items: baseline; }
  .verdict-mark { flex: 0 0 auto; font-weight: 700; font-size: 14px; line-height: 1; display: inline-block; width: 14px; text-align: center; }
  .verdict-mark.pass { color: var(--pass); }
  .verdict-mark.fail { color: var(--fail); }
  /* Pending judge — yellow pulsing dot in the verdict slot + shimmer skeleton
     where the rationale will land. The skeleton is part of the flex row so it
     sits *beside* the dot, not below — specificity here must beat .judges .j. */
  .judges .reveal-judge.pending { align-items: center; display: flex; }
  .reveal-judge.pending .verdict-mark {
    height: 14px;
    background: radial-gradient(circle, #f0b400 0 5px, transparent 5.5px);
    animation: judge-pulse 1.1s ease-in-out infinite;
    color: transparent;
  }
  .reveal-judge.pending .ghost-skel {
    display: block;
    margin: 0;
    flex: 1 1 auto;
    height: 12px;
  }
  .reveal-judge.pending .ghost-skel.short { flex: 0 1 55%; }
  @keyframes judge-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.85); } }

  /* Ghost card — placeholder while a drill is generating. */
  .card.ghost { border-left-color: var(--muted); opacity: 0.85; pointer-events: none; }
  .ghost-skel { background: linear-gradient(90deg, var(--bg) 0%, var(--border) 50%, var(--bg) 100%); background-size: 200% 100%; animation: ghost-shimmer 1.6s linear infinite; border-radius: 6px; margin: 8px 0; }
  .ghost-line { height: 16px; width: 70%; }
  .ghost-line.short { width: 45%; }
  .ghost-block { height: 56px; width: 100%; }
  @keyframes ghost-shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  .drill-entry { border-top: 1px dashed var(--border); padding: 8px 0; font-size: 13px; }
  .drill-entry .meta { color: var(--muted); }
</style>
</head>
<body>

<!-- Inline corpus. Sampled per-call; not in system prompt. -->
<script type="application/json" id="vocab">{{VOCAB_JSON}}</script>
<script type="application/json" id="grammar">{{GRAMMAR_JSON}}</script>

<h1>N4 Grammar Drill</h1>
<div id="root"></div>

<script>
/*__BUNDLE__*/
</script>
</body>
</html>
